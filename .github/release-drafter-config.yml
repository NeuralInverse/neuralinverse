name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'New Features'
    labels:
      - enhancement
      - feature
  - title: 'Bug Fixes'
    labels:
      - bug
      - fix
  - title: 'Firmware & Embedded'
    labels:
      - firmware
  - title: 'Legacy Modernisation'
    labels:
      - modernisation
  - title: 'AI Chat & Agent'
    labels:
      - ai-chat
      - agent
  - title: 'Power Mode'
    labels:
      - power-mode
  - title: 'Documentation'
    labels:
      - documentation
  - title: 'CI & Build'
    labels:
      - ci
      - build
  - title: 'Dependencies'
    labels:
      - dependencies

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - breaking-change
  minor:
    labels:
      - enhancement
      - feature
  patch:
    labels:
      - bug
      - fix
      - documentation
      - ci
      - build
      - dependencies
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION
