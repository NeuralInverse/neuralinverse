name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 9am UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity. If this is still relevant, please leave a comment.
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity. Please rebase and update if you'd like to continue.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen and update the branch if needed.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'
